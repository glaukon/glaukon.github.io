{% assign share_url = page.url | absolute_url | uri_escape %}
{% assign share_title = page.title | uri_escape %}

<aside class="share-box" aria-label="Compartir artículo">
  <span>Compartir artículo</span>
  <div class="share-actions">
    <a class="share-button" href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url }}" target="_blank" rel="noopener noreferrer" aria-label="Compartir en LinkedIn">
      <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" focusable="false">
        <path fill="currentColor" d="M6.28 8.9H3.75v10.35h2.53V8.9ZM5.02 4.75A1.48 1.48 0 1 0 6.5 6.23a1.48 1.48 0 0 0-1.48-1.48Zm5.65 4.15H8.25v10.35h2.52v-5.43c0-1.43.66-2.28 1.86-2.28 1.06 0 1.57.74 1.57 2.2v5.51h2.53v-6.07c0-2.76-1.47-4.5-3.77-4.5a3.05 3.05 0 0 0-2.29.98V8.9Z" />
      </svg>
      LinkedIn
    </a>
    <a class="share-button" href="https://x.com/intent/tweet?url={{ share_url }}&text={{ share_title }}" target="_blank" rel="noopener noreferrer" aria-label="Compartir en X">
      <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" focusable="false">
        <path fill="currentColor" d="M14.25 10.64 21.25 3h-2.06l-5.86 6.4L8.65 3h-5.9l7.34 10.02L2.75 21h2.06l6.2-6.76L15.96 21h5.9l-7.61-10.36Zm-2.2 2.4-.72-1L5.42 4.56h2.24l4.6 5.83.72 1 6.18 8.05h-2.24l-4.87-6.4Z" />
      </svg>
      X
    </a>
  </div>
</aside>
